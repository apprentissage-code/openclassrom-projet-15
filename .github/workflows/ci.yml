name: Continuous Integration

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: php-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            php-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare test environment
        run: |
          cp .env .env.test.local || true
          php bin/console cache:clear --env=test
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate -n --env=test || true
          php bin/console doctrine:fixtures:load -n --env=test || true

      - name: Build assets
        run: php bin/console sass:build || true

      - name: Run PHPUnit
        run: php bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse
